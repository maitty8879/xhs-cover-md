<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#fff;overflow:hidden}
.frame{width:1500px;height:2000px;background:#fff;color:#0e0f0c;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:600;color:#163300;padding:14px 36px;background:#9fe870;border:none;border-radius:9999px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:50%;background:#9fe870;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#163300;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:700;color:#0e0f0c}
.author-desc{font-size:22px;font-weight:400;color:#939084}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
.hero .overline{font-size:24px;font-weight:500;letter-spacing:2px;color:#939084;margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:128px;font-weight:900;line-height:1.05;letter-spacing:-4px;margin:0 0 36px;color:#0e0f0c;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:34px;font-weight:300;line-height:1.4;color:#939084;margin:0 0 52px;max-width:1000px}
.cta-row{display:flex;gap:20px}
.cta-primary{background:#9fe870;color:#163300;font-family:'Inter';font-size:22px;font-weight:600;padding:18px 42px;border-radius:9999px;border:none}
.cta-secondary{background:transparent;color:#0e0f0c;font-family:'Inter';font-size:22px;font-weight:500;padding:18px 42px;border-radius:9999px;border:1.5px solid #c5c0b1}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:#fff;border-radius:30px;padding:48px 36px 44px;text-align:center;box-shadow:rgba(14,15,12,.12) 0 0 0 1px}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:28px;font-weight:900;line-height:1.2;margin:0 0 12px;color:#0e0f0c}
.feature-desc{font-size:20px;font-weight:400;line-height:1.5;color:#939084;margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid #eceae3;flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:500;color:#939084;padding:7px 20px;border:1px solid #eceae3;border-radius:9999px}
.bottom-strip .tag.active{color:#163300;background:#9fe870;border-color:#9fe870}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.56</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 Wise 的<br>设计语言<br>做封面</h1><p class="subheadline">青柠绿 × 超粗字重 × 药丸按钮，金融科技界最清新的叛逆者</p><div class="cta-row"><button class="cta-primary">获取模板 →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🍋</div><h3 class="feature-title">青柠绿</h3><p class="feature-desc">#9fe870 + 深绿 #163300<br>自然感金融 不像银行</p></div>
    <div class="feature-card"><div class="feature-icon">💪</div><h3 class="feature-title">超粗字重</h3><p class="feature-desc">900 Black 标题<br>自信 · 大胆 · 不容忽视</p></div>
    <div class="feature-card"><div class="feature-icon">🫧</div><h3 class="feature-title">膨胀悬停</h3><p class="feature-desc">hover 时 scale(1.05)<br>按钮会「长大」不只变色</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">Coinbase</span><span class="tag">Revolut</span><span class="tag">Stripe</span><span class="tag">Uber</span><span class="tag active">Wise</span></div>
</div>
</body>
</html>
