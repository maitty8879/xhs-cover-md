<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: #000000; overflow: hidden; }
.frame {
  width: 1500px; height: 2000px; background: #000000; color: #ffffff;
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.top-bar { width: 100%; padding: 48px 80px 0; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; flex-shrink: 0; }
.series-tag { font-size: 28px; font-weight: 500; color: #0099ff; padding: 12px 32px; border: 2px solid rgba(0,153,255,0.2); border-radius: 100px; }
.author-info { display: flex; align-items: center; gap: 14px; }
.author-avatar { width: 64px; height: 64px; border-radius: 100px; background: #0099ff; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #000; font-family: 'Noto Sans SC', sans-serif; }
.author-text { display: flex; flex-direction: column; gap: 4px; }
.author-name { font-size: 28px; font-weight: 500; color: #ffffff; }
.author-desc { font-size: 22px; font-weight: 400; color: #a6a6a6; }
.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 100px; }
.hero .overline { font-size: 22px; font-weight: 500; letter-spacing: 3px; color: #a6a6a6; margin-bottom: 32px; text-transform: uppercase; }
.hero .headline { font-size: 128px; font-weight: 500; line-height: 0.95; letter-spacing: -5px; margin: 0 0 36px 0; color: #ffffff; font-family: 'Noto Sans SC', 'Inter', sans-serif; }
.hero .subheadline { font-size: 32px; font-weight: 400; line-height: 1.4; color: #a6a6a6; margin: 0 0 52px 0; max-width: 1100px; }
.cta-row { display: flex; gap: 20px; }
.cta-primary { background: #ffffff; color: #000000; font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 500; padding: 18px 48px; border-radius: 100px; border: none; }
.cta-secondary { background: rgba(255,255,255,0.1); color: #ffffff; font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 500; padding: 18px 48px; border-radius: 100px; border: none; backdrop-filter: blur(8px); }
.features { padding: 0 80px 64px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-shrink: 0; }
.feature-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(0,153,255,0.15); border-radius: 12px; padding: 48px 36px 44px; text-align: center; }
.feature-icon { font-size: 52px; margin-bottom: 20px; line-height: 1; }
.feature-title { font-size: 28px; font-weight: 500; line-height: 1.2; margin: 0 0 12px 0; color: #ffffff; letter-spacing: -1px; }
.feature-desc { font-size: 20px; font-weight: 400; line-height: 1.5; color: #a6a6a6; margin: 0; }
.bottom-strip { height: 72px; padding: 0 80px; display: flex; align-items: center; justify-content: center; gap: 14px; border-top: 1px solid rgba(0,153,255,0.1); flex-shrink: 0; }
.bottom-strip .tag { font-size: 17px; font-weight: 500; color: #666666; padding: 7px 20px; border: 1px solid rgba(255,255,255,0.08); border-radius: 100px; }
.bottom-strip .tag.active { color: #0099ff; border-color: rgba(0,153,255,0.25); }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">大厂设计语言 · Vol.22</span>
    <div class="author-info">
      <div class="author-avatar">元</div>
      <div class="author-text">
        <span class="author-name">元气菌.AI</span>
        <span class="author-desc">Learn in public 理念践行中</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <h1 class="headline">用 Framer 的<br>设计语言<br>做封面</h1>
    <p class="subheadline">深空纯黑 × 电光蓝 × 极限负字距，设计师的午夜夜店</p>
    <div class="cta-row">
      <button class="cta-primary">Start for Free →</button>
      <button class="cta-secondary">了解更多</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🌌</div><h3 class="feature-title">深空纯黑</h3><p class="feature-desc">#000000 绝对虚空<br>每个元素都在太空漂浮</p></div>
    <div class="feature-card"><div class="feature-icon">⚡</div><h3 class="feature-title">电光蓝</h3><p class="feature-desc">#0099FF 唯一强调色<br>冷冽 精准 只给交互</p></div>
    <div class="feature-card"><div class="feature-icon">🔤</div><h3 class="feature-title">弹簧字距</h3><p class="feature-desc">-5.5px 极限负字距<br>标题像被压缩的弹簧</p></div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Expo</span><span class="tag">Ferrari</span><span class="tag">Linear</span><span class="tag">Lovable</span><span class="tag active">Framer</span>
  </div>
</div>
</body>
</html>
