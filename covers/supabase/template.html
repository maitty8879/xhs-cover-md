<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#0f0f0f;overflow:hidden}
.frame{width:1500px;height:2000px;background:#0f0f0f;color:#fafafa;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:500;color:#3ecf8e;padding:12px 32px;border:2px solid rgba(62,207,142,.25);border-radius:6px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:6px;background:#3ecf8e;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#0f0f0f;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:500;color:#fafafa}
.author-desc{font-size:22px;font-weight:400;color:#898989}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
.hero .overline{font-size:22px;font-weight:500;letter-spacing:2px;color:#898989;margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:128px;font-weight:700;line-height:1.05;letter-spacing:-3px;margin:0 0 36px;color:#fafafa;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:32px;font-weight:300;line-height:1.4;color:#898989;margin:0 0 52px;max-width:1100px}
.cta-row{display:flex;gap:20px}
.cta-primary{background:#3ecf8e;color:#0f0f0f;font-family:'Inter';font-size:20px;font-weight:600;padding:18px 42px;border-radius:9999px;border:none}
.cta-secondary{background:rgba(255,255,255,.04);color:#fafafa;font-family:'Inter';font-size:20px;font-weight:400;padding:18px 42px;border-radius:6px;border:1px solid #2e2e2e}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:#171717;border-radius:8px;padding:48px 36px 44px;text-align:center;border:1px solid #2e2e2e}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:26px;font-weight:600;line-height:1.2;margin:0 0 12px;color:#fafafa}
.feature-desc{font-size:19px;font-weight:400;line-height:1.5;color:#898989;margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid #2e2e2e;flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:500;color:#898989;padding:7px 20px;border:1px solid #2e2e2e;border-radius:6px}
.bottom-strip .tag.active{color:#3ecf8e;border-color:rgba(62,207,142,.25)}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.48</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 Supabase<br>的设计语言<br>做封面</h1><p class="subheadline">代码编辑器黑 × 翡翠绿 × HSL 透明层叠，开发者的暗色美学</p><div class="cta-row"><button class="cta-primary">获取模板 →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">💎</div><h3 class="feature-title">翡翠绿</h3><p class="feature-desc">#3ecf8e PostgreSQL 绿<br>开源身份的视觉锚点</p></div>
    <div class="feature-card"><div class="feature-icon">🧪</div><h3 class="feature-title">HSL 层叠</h3><p class="feature-desc">半透明色彩层叠系统<br>用透明度创造深度</p></div>
    <div class="feature-card"><div class="feature-icon">💊</div><h3 class="feature-title">药丸 + 锐角</h3><p class="feature-desc">主 CTA 9999px 药丸<br>次级按钮 6px 方正</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">MongoDB</span><span class="tag">PostHog</span><span class="tag active">Supabase</span><span class="tag">Vercel</span><span class="tag">Warp</span></div>
</div>
</body>
</html>
