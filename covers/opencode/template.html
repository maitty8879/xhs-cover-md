<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: #201d1d; overflow: hidden; }
.frame {
  width: 1500px; height: 2000px; background: #201d1d; color: #fdfcfc;
  font-family: 'IBM Plex Mono', 'Noto Sans SC', monospace;
  position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.top-bar { width: 100%; padding: 48px 80px 0; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; flex-shrink: 0; }
.series-tag { font-size: 26px; font-weight: 500; color: #007aff; padding: 12px 32px; border: 2px solid rgba(0,122,255,0.3); border-radius: 4px; }
.author-info { display: flex; align-items: center; gap: 14px; }
.author-avatar { width: 64px; height: 64px; border-radius: 4px; background: #007aff; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #fff; font-family: 'Noto Sans SC', sans-serif; }
.author-text { display: flex; flex-direction: column; gap: 4px; }
.author-name { font-size: 26px; font-weight: 700; color: #fdfcfc; }
.author-desc { font-size: 20px; font-weight: 400; color: #9a9898; }
.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 80px; }
.hero .overline { font-size: 22px; font-weight: 500; letter-spacing: 3px; color: #9a9898; margin-bottom: 32px; text-transform: uppercase; }
.hero .headline { font-size: 110px; font-weight: 700; line-height: 1.15; letter-spacing: -2px; margin: 0 0 36px 0; color: #fdfcfc; font-family: 'Noto Sans SC', 'IBM Plex Mono', monospace; }
.hero .subheadline { font-size: 30px; font-weight: 400; line-height: 1.5; color: #9a9898; margin: 0 0 52px 0; max-width: 1100px; }
.cta-row { display: flex; gap: 20px; }
.cta-primary { background: #fdfcfc; color: #201d1d; font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 500; padding: 14px 36px; border-radius: 4px; border: none; }
.cta-secondary { background: transparent; color: #fdfcfc; font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 400; padding: 14px 36px; border-radius: 4px; border: 1px solid rgba(253,252,252,0.2); }
.features { padding: 0 80px 64px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-shrink: 0; }
.feature-card { background: #302c2c; border-radius: 4px; padding: 48px 36px 44px; text-align: center; border: 1px solid rgba(15,0,0,0.12); }
.feature-icon { font-size: 48px; margin-bottom: 20px; line-height: 1; }
.feature-title { font-size: 26px; font-weight: 700; line-height: 1.2; margin: 0 0 12px 0; color: #fdfcfc; }
.feature-desc { font-size: 18px; font-weight: 400; line-height: 1.5; color: #9a9898; margin: 0; }
.bottom-strip { height: 72px; padding: 0 80px; display: flex; align-items: center; justify-content: center; gap: 14px; border-top: 1px solid rgba(15,0,0,0.12); flex-shrink: 0; }
.bottom-strip .tag { font-size: 16px; font-weight: 500; color: #9a9898; padding: 7px 20px; border: 1px solid rgba(253,252,252,0.08); border-radius: 4px; }
.bottom-strip .tag.active { color: #007aff; border-color: rgba(0,122,255,0.3); }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">$ design-md --vol 03</span>
    <div class="author-info">
      <div class="author-avatar">元</div>
      <div class="author-text">
        <span class="author-name">元气菌.AI</span>
        <span class="author-desc">Learn in public 理念践行中</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="overline">// design system breakdown</div>
    <h1 class="headline">用 OpenCode<br>的设计语言<br>做封面</h1>
    <p class="subheadline">等宽字体一统天下 × 暖调深色终端 × 极简 4px 圆角</p>
    <div class="cta-row">
      <button class="cta-primary">&gt; get_template</button>
      <button class="cta-secondary">&gt; learn_more</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">⌨️</div><h3 class="feature-title">纯等宽字体</h3><p class="feature-desc">Berkeley Mono<br>一切皆代码的哲学</p></div>
    <div class="feature-card"><div class="feature-icon">🟫</div><h3 class="feature-title">暖调深色</h3><p class="feature-desc">#201d1d<br>微红棕色调 不是冷黑</p></div>
    <div class="feature-card"><div class="feature-icon">■</div><h3 class="feature-title">4px 圆角</h3><p class="feature-desc">锐利 · 实用 · 终端原生<br>拒绝圆润</p></div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Apple</span><span class="tag">Claude</span><span class="tag active">OpenCode</span><span class="tag">Figma</span><span class="tag">Tesla</span>
  </div>
</div>
</body>
</html>
