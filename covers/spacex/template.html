<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#000;overflow:hidden}
.frame{width:1500px;height:2000px;background:#000;color:#f0f0fa;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:400;color:rgba(240,240,250,.6);padding:12px 32px;border:1.5px solid rgba(240,240,250,.15);border-radius:32px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:50%;background:rgba(240,240,250,.1);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#f0f0fa;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:500;color:rgba(240,240,250,.8)}
.author-desc{font-size:22px;font-weight:400;color:rgba(240,240,250,.3)}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 100px}
.hero .overline{font-size:22px;font-weight:400;letter-spacing:4px;color:rgba(240,240,250,.25);margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:128px;font-weight:700;line-height:1.05;letter-spacing:-2px;margin:0 0 36px;color:#f0f0fa;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:32px;font-weight:300;line-height:1.4;color:rgba(240,240,250,.4);margin:0 0 52px;max-width:1100px}
.cta-row{display:flex;gap:20px}
.cta-primary{background:rgba(240,240,250,.1);color:#f0f0fa;font-family:'Inter';font-size:20px;font-weight:400;padding:18px 48px;border-radius:32px;border:1.5px solid rgba(240,240,250,.35);text-transform:uppercase;letter-spacing:2px}
.cta-secondary{background:transparent;color:rgba(240,240,250,.5);font-family:'Inter';font-size:20px;font-weight:400;padding:18px 48px;border-radius:32px;border:1px solid rgba(240,240,250,.1);text-transform:uppercase;letter-spacing:1px}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:rgba(240,240,250,.03);border-radius:16px;padding:48px 36px 44px;text-align:center;border:1px solid rgba(240,240,250,.06)}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:26px;font-weight:500;line-height:1.2;margin:0 0 12px;color:#f0f0fa;text-transform:uppercase;letter-spacing:1px}
.feature-desc{font-size:19px;font-weight:300;line-height:1.5;color:rgba(240,240,250,.35);margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid rgba(240,240,250,.06);flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:400;color:rgba(240,240,250,.25);padding:7px 20px;border:1px solid rgba(240,240,250,.06);border-radius:32px;text-transform:uppercase;letter-spacing:1px}
.bottom-strip .tag.active{color:rgba(240,240,250,.7);border-color:rgba(240,240,250,.2)}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.45</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 SpaceX 的<br>设计语言<br>做封面</h1><p class="subheadline">纯黑虚空 × 星光白 × 幽灵按钮，一场太空摄影展的 UI</p><div class="cta-row"><button class="cta-primary">Explore →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🌌</div><h3 class="feature-title">零色彩</h3><p class="feature-desc">全站只有黑与白<br>连灰色都不给</p></div>
    <div class="feature-card"><div class="feature-icon">✨</div><h3 class="feature-title">星光白</h3><p class="feature-desc">#f0f0fa 微偏蓝紫<br>像星光 不是纯白</p></div>
    <div class="feature-card"><div class="feature-icon">👻</div><h3 class="feature-title">幽灵按钮</h3><p class="feature-desc">10% 透明度背景<br>全站唯一交互元素</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">BMW</span><span class="tag">Lamborghini</span><span class="tag active">SpaceX</span><span class="tag">Tesla</span><span class="tag">xAI</span></div>
</div>
</body>
</html>
