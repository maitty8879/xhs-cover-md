<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mintlify Design System Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#ffffff; overflow:hidden; }
  .frame {
    width:1500px; height:2000px; display:flex; flex-direction:column;
    font-family:'Inter','Noto Sans SC',sans-serif; position:relative;
    background:#ffffff; box-sizing:border-box; padding:60px 80px 50px;
  }
  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:40px;
  }
  .series-tag {
    background:#18E299; color:#0d0d0d; font-size:28px; font-weight:600;
    padding:12px 30px; border-radius:9999px;
  }
  .author {
    font-size:22px; color:#666666; font-weight:500;
  }
  .author strong { color:#0d0d0d; }
  .hero { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .overline {
    font-size:26px; font-weight:600; color:#18E299;
    text-transform:uppercase; letter-spacing:2px; margin-bottom:20px;
  }
  .headline {
    font-size:128px; font-weight:600; color:#0d0d0d;
    line-height:1.15; margin-bottom:30px; letter-spacing:-2px;
    white-space:pre-line;
  }
  .subheadline {
    font-size:32px; font-weight:400; color:#666666;
    margin-bottom:50px; line-height:1.5;
  }
  .cta-row { display:flex; gap:20px; margin-bottom:60px; }
  .cta-primary {
    background:#0d0d0d; color:#ffffff; font-size:26px; font-weight:500;
    padding:18px 44px; border-radius:9999px; border:none;
  }
  .cta-secondary {
    background:#ffffff; color:#0d0d0d; font-size:26px; font-weight:500;
    padding:18px 44px; border-radius:9999px;
    border:1px solid rgba(0,0,0,0.08);
  }
  .features {
    display:grid; grid-template-columns:repeat(3,1fr); gap:30px;
    margin-bottom:50px;
  }
  .feature-card {
    background:#ffffff; border-radius:16px; padding:40px 32px;
    border:1px solid rgba(0,0,0,0.05);
    box-shadow: rgba(0,0,0,0.03) 0px 2px 4px;
  }
  .feature-emoji { font-size:48px; margin-bottom:16px; }
  .feature-title {
    font-size:28px; font-weight:600; color:#0d0d0d; margin-bottom:12px;
    letter-spacing:-0.3px;
  }
  .feature-desc {
    font-size:20px; font-weight:400; color:#666666; line-height:1.5;
  }
  .bottom-strip {
    display:flex; gap:16px; justify-content:center; padding-top:20px;
    border-top:1px solid rgba(0,0,0,0.05);
  }
  .bottom-strip .tag {
    font-size:20px; font-weight:500; color:#888888;
    padding:10px 24px; border-radius:9999px;
    border:1px solid rgba(0,0,0,0.05);
  }
  .bottom-strip .tag.active {
    background:#18E299; color:#0d0d0d; border-color:#18E299;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <div class="series-tag">Vol.31 设计系统拆解</div>
    <div class="author"><strong>元气菌.AI</strong> / Learn in public 理念践行中</div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <div class="headline">用 Mintlify 的
设计语言
做封面</div>
    <div class="subheadline">Brand Green × 负字距紧凑标题 × 文档即产品的极简美学</div>
    <div class="cta-row">
      <div class="cta-primary">查看拆解 →</div>
      <div class="cta-secondary">设计档案</div>
    </div>
  </div>
  <div class="features">
    <div class="feature-card">
      <div class="feature-emoji">💚</div>
      <div class="feature-title">氛围感渐变 Hero</div>
      <div class="feature-desc">云雾般的绿白渐变洗涤创造空灵智感氛围</div>
    </div>
    <div class="feature-card">
      <div class="feature-emoji">💊</div>
      <div class="feature-title">全药丸形态</div>
      <div class="feature-desc">按钮、输入框、徽章全部 9999px 圆角，品牌签名形态</div>
    </div>
    <div class="feature-card">
      <div class="feature-emoji">✨</div>
      <div class="feature-title">5% 透明度边框</div>
      <div class="feature-desc">几乎不可见的边框替代阴影，创造纸感分离效果</div>
    </div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Vercel</span>
    <span class="tag">Linear</span>
    <span class="tag">Stripe</span>
    <span class="tag active">Mintlify</span>
    <span class="tag">Figma</span>
  </div>
</div>
</body>
</html>
