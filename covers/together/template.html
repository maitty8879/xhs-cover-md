<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#010120;overflow:hidden}
.frame{width:1500px;height:2000px;background:#010120;color:#fff;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:500;color:#ef2cc1;padding:12px 32px;border:2px solid rgba(239,44,193,.25);border-radius:8px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:8px;background:linear-gradient(135deg,#ef2cc1,#fc4c02);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:500;color:#fff}
.author-desc{font-size:22px;font-weight:400;color:rgba(255,255,255,.4)}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
.hero .overline{font-size:22px;font-weight:500;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:120px;font-weight:700;line-height:1.05;letter-spacing:-2px;margin:0 0 36px;color:#fff;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:32px;font-weight:300;line-height:1.4;color:rgba(255,255,255,.45);margin:0 0 52px;max-width:1100px}
.cta-row{display:flex;gap:20px}
.cta-primary{background:#ef2cc1;color:#fff;font-family:'Inter';font-size:20px;font-weight:500;padding:18px 42px;border-radius:8px;border:none}
.cta-secondary{background:rgba(255,255,255,.05);color:#bdbbff;font-family:'Inter';font-size:20px;font-weight:400;padding:18px 42px;border-radius:8px;border:1px solid rgba(189,187,255,.15)}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:rgba(255,255,255,.03);border-radius:12px;padding:48px 36px 44px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:26px;font-weight:600;line-height:1.2;margin:0 0 12px;color:#fff}
.feature-desc{font-size:19px;font-weight:400;line-height:1.5;color:rgba(255,255,255,.4);margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:500;color:rgba(255,255,255,.25);padding:7px 20px;border:1px solid rgba(255,255,255,.06);border-radius:8px}
.bottom-strip .tag.active{color:#ef2cc1;border-color:rgba(239,44,193,.2)}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.50</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 Together<br>的设计语言<br>做封面</h1><p class="subheadline">午夜深蓝 × 品红渐变 × 双世界设计，AI 基建公司的美学</p><div class="cta-row"><button class="cta-primary">获取模板 →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🌃</div><h3 class="feature-title">午夜深蓝</h3><p class="feature-desc">#010120 不是灰黑<br>是真正的午夜蓝</p></div>
    <div class="feature-card"><div class="feature-icon">🩷</div><h3 class="feature-title">品红 × 橙</h3><p class="feature-desc">#ef2cc1 → #fc4c02<br>只出现在插画 不染 UI</p></div>
    <div class="feature-card"><div class="feature-icon">💜</div><h3 class="feature-title">薰衣草辅色</h3><p class="feature-desc">#bdbbff 柔软的紫<br>链接和次级交互的声音</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">Cohere</span><span class="tag">Mistral</span><span class="tag">Replicate</span><span class="tag active">Together</span><span class="tag">xAI</span></div>
</div>
</body>
</html>
