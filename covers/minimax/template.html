<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMax Design System Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#ffffff; overflow:hidden; }
  .frame {
    width:1500px; height:2000px; display:flex; flex-direction:column;
    font-family:'Inter','Noto Sans SC',sans-serif; position:relative;
    background:#ffffff; box-sizing:border-box; padding:60px 80px 50px;
  }
  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:40px;
  }
  .series-tag {
    background:#1456f0; color:#ffffff; font-size:28px; font-weight:600;
    padding:12px 30px; border-radius:9999px;
  }
  .author {
    font-size:22px; color:#45515e; font-weight:500;
  }
  .author strong { color:#222222; }
  .hero { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .overline {
    font-size:26px; font-weight:600; color:#1456f0;
    text-transform:uppercase; letter-spacing:2px; margin-bottom:20px;
  }
  .headline {
    font-size:128px; font-weight:600; color:#222222;
    line-height:1.15; margin-bottom:30px; white-space:pre-line;
  }
  .subheadline {
    font-size:32px; font-weight:500; color:#45515e;
    margin-bottom:50px; line-height:1.5;
  }
  .cta-row { display:flex; gap:20px; margin-bottom:60px; }
  .cta-primary {
    background:#181e25; color:#ffffff; font-size:26px; font-weight:600;
    padding:18px 44px; border-radius:8px; border:none;
  }
  .cta-secondary {
    background:#f0f0f0; color:#333333; font-size:26px; font-weight:600;
    padding:18px 44px; border-radius:8px; border:none;
  }
  .features {
    display:grid; grid-template-columns:repeat(3,1fr); gap:30px;
    margin-bottom:50px;
  }
  .feature-card {
    background:#f8f8ff; border-radius:20px; padding:40px 32px;
    box-shadow: rgba(44,30,116,0.16) 0px 0px 15px;
  }
  .feature-emoji { font-size:48px; margin-bottom:16px; }
  .feature-title {
    font-size:28px; font-weight:600; color:#222222; margin-bottom:12px;
  }
  .feature-desc {
    font-size:20px; font-weight:400; color:#45515e; line-height:1.5;
  }
  .bottom-strip {
    display:flex; gap:16px; justify-content:center; padding-top:20px;
    border-top:1px solid #f2f3f5;
  }
  .bottom-strip .tag {
    font-size:20px; font-weight:500; color:#8e8e93;
    padding:10px 24px; border-radius:9999px; background:#f8f8f8;
  }
  .bottom-strip .tag.active {
    background:#1456f0; color:#ffffff;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <div class="series-tag">Vol.30 设计系统拆解</div>
    <div class="author"><strong>元气菌.AI</strong> / Learn in public 理念践行中</div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <div class="headline">用 MiniMax 的
设计语言
做封面</div>
    <div class="subheadline">Brand Blue × 多字体协奏 × 圆润友好的 AI 画廊</div>
    <div class="cta-row">
      <div class="cta-primary">查看拆解 →</div>
      <div class="cta-secondary">设计档案</div>
    </div>
  </div>
  <div class="features">
    <div class="feature-card">
      <div class="feature-emoji">💊</div>
      <div class="feature-title">9999px 药丸按钮</div>
      <div class="feature-desc">导航和交互全部采用全圆角药丸形态，极具辨识度</div>
    </div>
    <div class="feature-card">
      <div class="feature-emoji">🎨</div>
      <div class="feature-title">彩色产品卡片</div>
      <div class="feature-desc">白底画布上用渐变色卡片展示 AI 产品，如同手机图标</div>
    </div>
    <div class="feature-card">
      <div class="feature-emoji">🟣</div>
      <div class="feature-title">紫色品牌投影</div>
      <div class="feature-desc">独特的紫色调阴影系统，将品牌色融入空间层次</div>
    </div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Vercel</span>
    <span class="tag">Linear</span>
    <span class="tag">Stripe</span>
    <span class="tag active">MiniMax</span>
    <span class="tag">Figma</span>
  </div>
</div>
</body>
</html>
