<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#fffefb;overflow:hidden}
.frame{width:1500px;height:2000px;background:#fffefb;color:#201515;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:600;color:#ff4f00;padding:14px 36px;border:2px solid rgba(255,79,0,.2);border-radius:980px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:50%;background:#ff4f00;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:600;color:#201515}
.author-desc{font-size:22px;font-weight:400;color:#939084}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
.hero .overline{font-size:24px;font-weight:500;letter-spacing:2px;color:#939084;margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:128px;font-weight:700;line-height:1.05;letter-spacing:-4px;margin:0 0 36px;color:#201515;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:34px;font-weight:300;line-height:1.4;color:#939084;margin:0 0 52px;max-width:1000px;font-family:'Noto Serif SC','Noto Sans SC',serif;font-style:italic}
.cta-row{display:flex;gap:20px}
.cta-primary{background:#ff4f00;color:#fff;font-family:'Inter';font-size:22px;font-weight:600;padding:18px 42px;border-radius:980px;border:none}
.cta-secondary{background:transparent;color:#201515;font-family:'Inter';font-size:22px;font-weight:500;padding:18px 42px;border-radius:980px;border:1.5px solid #c5c0b1}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:#fffefb;border-radius:20px;padding:48px 36px 44px;text-align:center;border:1px solid #eceae3}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:28px;font-weight:700;line-height:1.2;margin:0 0 12px;color:#201515}
.feature-desc{font-size:20px;font-weight:400;line-height:1.5;color:#939084;margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid #eceae3;flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:500;color:#939084;padding:7px 20px;border:1px solid #eceae3;border-radius:980px}
.bottom-strip .tag.active{color:#ff4f00;border-color:rgba(255,79,0,.2)}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.58</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 Zapier 的<br>设计语言<br>做封面</h1><p class="subheadline">暖奶油纸 × 落日橙 × 衬线点缀，自动化工具的手工温度</p><div class="cta-row"><button class="cta-primary">获取模板 →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🧈</div><h3 class="feature-title">奶油纸</h3><p class="feature-desc">#fffefb 不是纯白<br>是未漂白纸张的暖调</p></div>
    <div class="feature-card"><div class="feature-icon">🔥</div><h3 class="feature-title">Zapier 橙</h3><p class="feature-desc">#ff4f00 落日暖橙<br>热情但不攻击性</p></div>
    <div class="feature-card"><div class="feature-icon">✒️</div><h3 class="feature-title">衬线点缀</h3><p class="feature-desc">GT Alpina 编辑感衬线<br>极细字重 极负字距</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">Airtable</span><span class="tag">Intercom</span><span class="tag">Notion</span><span class="tag">Webflow</span><span class="tag active">Zapier</span></div>
</div>
</body>
</html>
