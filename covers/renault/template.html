<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1500">
<title>Vol.38 — Renault Design System Cover</title>
<style>
  html, body { margin:0; padding:0; background:#000000; overflow:hidden; }
  .frame {
    width:1500px; height:2000px; display:flex; flex-direction:column;
    background:#000000; font-family:'NouvelR','Inter',sans-serif;
    color:#ffffff; position:relative;
  }
  /* aurora bg hint */
  .frame::before {
    content:''; position:absolute; top:0; left:0; right:0; bottom:0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(200,50,150,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 60%, rgba(60,180,200,0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(120,50,200,0.15) 0%, transparent 50%);
    pointer-events:none; z-index:0;
  }
  .frame > * { position:relative; z-index:1; }
  /* top-bar */
  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    padding:48px 64px 0 64px;
  }
  .series-tag {
    background:#EFDF00; color:#000000; font-size:28px; font-weight:700;
    padding:14px 36px; border-radius:0; letter-spacing:0.5px;
  }
  .author {
    font-size:26px; font-weight:400; color:#D9D9D6;
  }
  /* hero */
  .hero {
    flex:1; display:flex; flex-direction:column; justify-content:center;
    padding:0 80px;
  }
  .overline {
    font-size:26px; font-weight:400; color:#D9D9D6;
    text-transform:uppercase; letter-spacing:4px; margin-bottom:32px;
  }
  .headline {
    font-size:128px; font-weight:700; line-height:0.95;
    color:#ffffff; margin-bottom:40px; white-space:pre-line;
  }
  .headline em {
    font-style:normal; color:#EFDF00;
  }
  .subheadline {
    font-size:34px; font-weight:400; color:#D9D9D6;
    line-height:1.6; margin-bottom:56px; max-width:1100px;
  }
  .cta-row { display:flex; gap:24px; }
  .cta-primary {
    background:#EFDF00; color:#000000; font-size:30px; font-weight:700;
    padding:22px 56px; border-radius:0; border:none; cursor:pointer;
    letter-spacing:0.15px;
  }
  .cta-secondary {
    background:transparent; color:#ffffff; font-size:30px; font-weight:700;
    padding:22px 56px; border-radius:0; border:2px solid #ffffff; cursor:pointer;
  }
  /* features */
  .features {
    display:grid; grid-template-columns:repeat(3,1fr); gap:28px;
    padding:0 64px; margin-bottom:40px;
  }
  .feature-card {
    background:#222222; border:1.5px solid #333333; border-radius:0;
    padding:44px 36px; display:flex; flex-direction:column; gap:14px;
  }
  .feature-card .icon { font-size:42px; }
  .feature-card h3 {
    font-size:28px; font-weight:700; margin:0; color:#ffffff;
  }
  .feature-card p {
    font-size:22px; font-weight:400; color:#D9D9D6; margin:0; line-height:1.5;
  }
  /* bottom-strip */
  .bottom-strip {
    display:flex; gap:16px; padding:36px 64px 52px 64px;
    flex-wrap:wrap;
  }
  .bottom-strip .tag {
    background:transparent; border:1.5px solid #D9D9D6; border-radius:0;
    padding:12px 32px; font-size:22px; font-weight:700; color:#D9D9D6;
  }
  .bottom-strip .tag.accent {
    background:#EFDF00; border-color:#EFDF00; color:#000000;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">Vol.38 · Design System Breakdown</span>
    <span class="author">元气菌.AI</span>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <div class="headline">用 <em>Renault</em> 的
设计语言
做封面</div>
    <div class="subheadline">极光渐变英雄区 · NouvelR 专属字体 28° 斜切 · 雷诺黄 #EFDF00 · 零圆角精密工程</div>
    <div class="cta-row">
      <button class="cta-primary">探索设计系统</button>
      <button class="cta-secondary">查看源文件</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card">
      <div class="icon">💛</div>
      <h3>雷诺黄</h3>
      <p>#EFDF00 标志性品牌黄，最高优先级 CTA 专用</p>
    </div>
    <div class="feature-card">
      <div class="icon">🔷</div>
      <h3>零圆角系统</h3>
      <p>所有按钮直角矩形，精密工程质感</p>
    </div>
    <div class="feature-card">
      <div class="icon">🌈</div>
      <h3>极光渐变</h3>
      <p>品红→紫罗兰→青色极光，数字展厅的标志视觉</p>
    </div>
  </div>
  <div class="bottom-strip">
    <span class="tag accent">#Renault</span>
    <span class="tag">#DesignSystem</span>
    <span class="tag">#NouvelR</span>
    <span class="tag">#ZeroRadius</span>
    <span class="tag">#Aurora</span>
  </div>
</div>
</body>
</html>
