<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#fff;overflow:hidden}
.frame{width:1500px;height:2000px;background:#fff;color:#080808;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:600;color:#146ef5;padding:12px 32px;border:2px solid rgba(20,110,245,.2);border-radius:980px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:50%;background:#146ef5;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:600;color:#080808}
.author-desc{font-size:22px;font-weight:400;color:rgba(8,8,8,.45)}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
.hero .overline{font-size:24px;font-weight:500;letter-spacing:2px;color:rgba(8,8,8,.35);margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:128px;font-weight:600;line-height:1.05;letter-spacing:-3px;margin:0 0 36px;color:#080808;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:34px;font-weight:300;line-height:1.4;color:rgba(8,8,8,.45);margin:0 0 52px;max-width:1000px}
.cta-row{display:flex;gap:20px}
.cta-primary{background:#146ef5;color:#fff;font-family:'Inter';font-size:22px;font-weight:600;padding:18px 42px;border-radius:980px;border:none}
.cta-secondary{background:transparent;color:#080808;font-family:'Inter';font-size:22px;font-weight:500;padding:18px 42px;border-radius:980px;border:1.5px solid rgba(8,8,8,.15)}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:#fff;border-radius:16px;padding:48px 36px 44px;text-align:center;border:1px solid rgba(8,8,8,.08)}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:28px;font-weight:700;line-height:1.2;margin:0 0 12px;color:#080808}
.feature-desc{font-size:20px;font-weight:400;line-height:1.5;color:rgba(8,8,8,.45);margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid rgba(8,8,8,.06);flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:500;color:rgba(8,8,8,.3);padding:7px 20px;border:1px solid rgba(8,8,8,.08);border-radius:980px}
.bottom-strip .tag.active{color:#146ef5;border-color:rgba(20,110,245,.2)}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.55</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 Webflow<br>的设计语言<br>做封面</h1><p class="subheadline">Webflow 蓝 × 彩虹辅色 × 药丸按钮，无代码设计的视觉自信</p><div class="cta-row"><button class="cta-primary">获取模板 →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🔵</div><h3 class="feature-title">Webflow 蓝</h3><p class="feature-desc">#146ef5<br>主品牌色 + 交互色合一</p></div>
    <div class="feature-card"><div class="feature-icon">🌈</div><h3 class="feature-title">彩虹辅色</h3><p class="feature-desc">紫/粉/绿/橙/黄/红<br>六色辅助体系 极其丰富</p></div>
    <div class="feature-card"><div class="feature-icon">🎨</div><h3 class="feature-title">工具感</h3><p class="feature-desc">WF Visual Sans 定制字体<br>600 标题 500 正文 精准分层</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">Figma</span><span class="tag">Framer</span><span class="tag">Miro</span><span class="tag active">Webflow</span><span class="tag">Zapier</span></div>
</div>
</body>
</html>
