<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistral AI Design System Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#fffaeb; overflow:hidden; }
  .frame {
    width:1500px; height:2000px; display:flex; flex-direction:column;
    font-family:'Inter','Noto Sans SC',sans-serif; position:relative;
    background:#fffaeb; box-sizing:border-box; padding:60px 80px 50px;
  }
  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:40px;
  }
  .series-tag {
    background:#fa520f; color:#ffffff; font-size:28px; font-weight:400;
    padding:12px 30px; border-radius:0px;
  }
  .author {
    font-size:22px; color:#1f1f1f; font-weight:400;
  }
  .author strong { color:#1f1f1f; }
  .hero { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .overline {
    font-size:26px; font-weight:400; color:#fa520f;
    text-transform:uppercase; letter-spacing:2px; margin-bottom:20px;
  }
  .headline {
    font-size:128px; font-weight:400; color:#1f1f1f;
    line-height:1.0; margin-bottom:30px; letter-spacing:-2.5px;
    white-space:pre-line;
  }
  .subheadline {
    font-size:32px; font-weight:400; color:#1f1f1f;
    margin-bottom:50px; line-height:1.5; opacity:0.7;
  }
  .cta-row { display:flex; gap:20px; margin-bottom:60px; }
  .cta-primary {
    background:#1f1f1f; color:#ffffff; font-size:26px; font-weight:400;
    padding:18px 44px; border-radius:0px; border:none;
    text-transform:uppercase;
  }
  .cta-secondary {
    background:#fff0c2; color:#1f1f1f; font-size:26px; font-weight:400;
    padding:18px 44px; border-radius:0px; border:none;
    text-transform:uppercase;
  }
  .features {
    display:grid; grid-template-columns:repeat(3,1fr); gap:30px;
    margin-bottom:50px;
  }
  .feature-card {
    background:#fff0c2; border-radius:0px; padding:40px 32px;
    box-shadow: rgba(127,99,21,0.12) -8px 16px 39px;
  }
  .feature-emoji { font-size:48px; margin-bottom:16px; }
  .feature-title {
    font-size:28px; font-weight:400; color:#1f1f1f; margin-bottom:12px;
  }
  .feature-desc {
    font-size:20px; font-weight:400; color:#1f1f1f; line-height:1.5;
    opacity:0.7;
  }
  .bottom-strip {
    display:flex; gap:16px; justify-content:center; padding-top:20px;
    border-top:1px solid rgba(127,99,21,0.15);
  }
  .bottom-strip .tag {
    font-size:20px; font-weight:400; color:#1f1f1f;
    padding:10px 24px; border-radius:0px; opacity:0.5;
    background:#fff0c2;
  }
  .bottom-strip .tag.active {
    background:#fa520f; color:#ffffff; opacity:1;
  }
  .gradient-bar {
    display:flex; height:8px; margin-bottom:40px; gap:0;
  }
  .gradient-bar span {
    flex:1;
  }
  .gradient-bar span:nth-child(1) { background:#ffd900; }
  .gradient-bar span:nth-child(2) { background:#ffe295; }
  .gradient-bar span:nth-child(3) { background:#ffa110; }
  .gradient-bar span:nth-child(4) { background:#ff8105; }
  .gradient-bar span:nth-child(5) { background:#fb6424; }
  .gradient-bar span:nth-child(6) { background:#fa520f; }
</style>
</head>
<body>
<div class="frame">
  <div class="gradient-bar">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="top-bar">
    <div class="series-tag">Vol.33 设计系统拆解</div>
    <div class="author"><strong>元气菌.AI</strong> / Learn in public 理念践行中</div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <div class="headline">用 Mistral 的
设计语言
做封面</div>
    <div class="subheadline">Mistral Orange × 单一字重极简 × 南法金色暖阳美学</div>
    <div class="cta-row">
      <div class="cta-primary">查看拆解 →</div>
      <div class="cta-secondary">设计档案</div>
    </div>
  </div>
  <div class="features">
    <div class="feature-card">
      <div class="feature-emoji">🌅</div>
      <div class="feature-title">全暖色温宇宙</div>
      <div class="feature-desc">从象牙白到焦橙，每个色调都浸染在金色午后阳光中</div>
    </div>
    <div class="feature-card">
      <div class="feature-emoji">📐</div>
      <div class="feature-title">零圆角锐利几何</div>
      <div class="feature-desc">全部直角切割，建筑般的精准感与暖色形成张力</div>
    </div>
    <div class="feature-card">
      <div class="feature-emoji">🎚️</div>
      <div class="feature-title">400 唯一字重</div>
      <div class="feature-desc">整个系统只用 Regular 字重，靠字号和颜色驱动层级</div>
    </div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Vercel</span>
    <span class="tag">Linear</span>
    <span class="tag">Stripe</span>
    <span class="tag active">Mistral</span>
    <span class="tag">Figma</span>
  </div>
</div>
</body>
</html>
