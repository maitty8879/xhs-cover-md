<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: #000000; overflow: hidden; }
.frame {
  width: 1500px; height: 2000px; background: #000000; color: #ffffff;
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.top-bar { width: 100%; padding: 48px 80px 0; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; flex-shrink: 0; }
.series-tag { font-size: 28px; font-weight: 400; color: #ffffff; padding: 14px 36px; border: 1px solid #27272a; border-radius: 8px; letter-spacing: -0.5px; }
.author-info { display: flex; align-items: center; gap: 14px; }
.author-avatar { width: 64px; height: 64px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #fff; font-family: 'Noto Sans SC', sans-serif; border: 1px solid #27272a; }
.author-text { display: flex; flex-direction: column; gap: 4px; }
.author-name { font-size: 28px; font-weight: 600; color: #ffffff; }
.author-desc { font-size: 22px; font-weight: 400; color: #767d88; }
.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 80px; }
.hero .overline { font-size: 24px; font-weight: 500; letter-spacing: 2px; color: #767d88; margin-bottom: 32px; text-transform: uppercase; }
.hero .headline { font-size: 128px; font-weight: 400; line-height: 1.0; letter-spacing: -3px; margin: 0 0 36px 0; color: #ffffff; font-family: 'Noto Sans SC', 'Inter', sans-serif; }
.hero .subheadline { font-size: 34px; font-weight: 400; line-height: 1.4; color: #767d88; margin: 0 0 52px 0; max-width: 1000px; letter-spacing: -0.3px; }
.cta-row { display: flex; gap: 20px; }
.cta-primary { background: #ffffff; color: #000000; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 4px; border: none; }
.cta-secondary { background: transparent; color: #ffffff; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 4px; border: 1px solid #27272a; }
.features { padding: 0 80px 64px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-shrink: 0; }
.feature-card { background: #1a1a1a; border-radius: 8px; padding: 48px 36px 44px; text-align: center; border: 1px solid #27272a; }
.feature-icon { font-size: 52px; margin-bottom: 20px; line-height: 1; }
.feature-title { font-size: 28px; font-weight: 400; line-height: 1.2; margin: 0 0 12px 0; color: #ffffff; letter-spacing: -0.3px; }
.feature-desc { font-size: 20px; font-weight: 400; line-height: 1.5; color: #767d88; margin: 0; }
.bottom-strip { height: 72px; padding: 0 80px; display: flex; align-items: center; justify-content: center; gap: 14px; border-top: 1px solid #27272a; flex-shrink: 0; }
.bottom-strip .tag { font-size: 17px; font-weight: 500; color: #767d88; padding: 7px 20px; border: 1px solid #27272a; border-radius: 4px; }
.bottom-strip .tag.active { color: #ffffff; border-color: #ffffff; }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">大厂设计语言 · Vol.42</span>
    <div class="author-info">
      <div class="author-avatar">元</div>
      <div class="author-text">
        <span class="author-name">元气菌.AI</span>
        <span class="author-desc">Learn in public 理念践行中</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <h1 class="headline">用 Runway 的<br>设计语言<br>做封面</h1>
    <p class="subheadline">冷灰影调 × 单字体极简 × 电影级视觉叙事</p>
    <div class="cta-row">
      <button class="cta-primary">获取模板 →</button>
      <button class="cta-secondary">了解更多</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🎬</div><h3 class="feature-title">电影级画面</h3><p class="feature-desc">全出血摄影为主角<br>界面隐入黑暗</p></div>
    <div class="feature-card"><div class="feature-icon">🔤</div><h3 class="feature-title">单字体系统</h3><p class="feature-desc">abcNormal 一体全控<br>450 精细中间字重</p></div>
    <div class="feature-card"><div class="feature-icon">🌑</div><h3 class="feature-title">零阴影界面</h3><p class="feature-desc">不用 box-shadow<br>摄影本身即景深</p></div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Pika</span><span class="tag">Kling</span><span class="tag">Sora</span><span class="tag">Luma</span><span class="tag active">Runway</span>
  </div>
</div>
</body>
</html>
