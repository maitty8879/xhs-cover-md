<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: #f0f0f3; overflow: hidden; }
.frame {
  width: 1500px; height: 2000px; background: #f0f0f3; color: #000000;
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.top-bar { width: 100%; padding: 48px 80px 0; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; flex-shrink: 0; }
.series-tag { font-size: 28px; font-weight: 600; color: #000000; padding: 12px 32px; border: 2px solid rgba(0,0,0,0.15); border-radius: 9999px; }
.author-info { display: flex; align-items: center; gap: 14px; }
.author-avatar { width: 64px; height: 64px; border-radius: 9999px; background: #000000; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #fff; font-family: 'Noto Sans SC', sans-serif; }
.author-text { display: flex; flex-direction: column; gap: 4px; }
.author-name { font-size: 28px; font-weight: 500; color: #1c2024; }
.author-desc { font-size: 22px; font-weight: 400; color: #60646c; }
.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 100px; }
.hero .overline { font-size: 22px; font-weight: 500; letter-spacing: 3px; color: #60646c; margin-bottom: 32px; text-transform: uppercase; }
.hero .headline { font-size: 128px; font-weight: 800; line-height: 1.05; letter-spacing: -3px; margin: 0 0 36px 0; color: #000000; font-family: 'Noto Sans SC', 'Inter', sans-serif; }
.hero .subheadline { font-size: 32px; font-weight: 400; line-height: 1.4; color: #60646c; margin: 0 0 52px 0; max-width: 1100px; }
.cta-row { display: flex; gap: 20px; }
.cta-primary { background: #000000; color: #fff; font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 600; padding: 18px 48px; border-radius: 9999px; border: none; }
.cta-secondary { background: #ffffff; color: #1c2024; font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 500; padding: 18px 48px; border-radius: 9999px; border: 1px solid #d9d9e0; }
.features { padding: 0 80px 64px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-shrink: 0; }
.feature-card { background: #ffffff; border: 1px solid #e0e1e6; border-radius: 16px; padding: 48px 36px 44px; text-align: center; box-shadow: rgba(0,0,0,0.08) 0px 3px 6px, rgba(0,0,0,0.07) 0px 2px 4px; }
.feature-icon { font-size: 52px; margin-bottom: 20px; line-height: 1; }
.feature-title { font-size: 28px; font-weight: 600; line-height: 1.2; margin: 0 0 12px 0; color: #1c2024; letter-spacing: -0.25px; }
.feature-desc { font-size: 20px; font-weight: 400; line-height: 1.5; color: #60646c; margin: 0; }
.bottom-strip { height: 72px; padding: 0 80px; display: flex; align-items: center; justify-content: center; gap: 14px; border-top: 1px solid #e0e1e6; flex-shrink: 0; }
.bottom-strip .tag { font-size: 17px; font-weight: 500; color: #b0b4ba; padding: 7px 20px; border: 1px solid #e0e1e6; border-radius: 9999px; }
.bottom-strip .tag.active { color: #000000; border-color: rgba(0,0,0,0.2); background: #ffffff; }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">大厂设计语言 · Vol.20</span>
    <div class="author-info">
      <div class="author-avatar">元</div>
      <div class="author-text">
        <span class="author-name">元气菌.AI</span>
        <span class="author-desc">Learn in public 理念践行中</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <h1 class="headline">用 Expo 的<br>设计语言<br>做封面</h1>
    <p class="subheadline">冷调灰白 × 胶囊圆角 × 极致单色，开发者工具的呼吸感美学</p>
    <div class="cta-row">
      <button class="cta-primary">Get Started →</button>
      <button class="cta-secondary">了解更多</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">💊</div><h3 class="feature-title">胶囊圆角</h3><p class="feature-desc">9999px 全圆角按钮<br>开发工具也能如此温柔</p></div>
    <div class="feature-card"><div class="feature-icon">⚫</div><h3 class="feature-title">纯黑单色</h3><p class="feature-desc">#000000 标题 + 冷灰副文<br>色彩只来自产品截图</p></div>
    <div class="feature-card"><div class="feature-icon">🌬️</div><h3 class="feature-title">画廊呼吸</h3><p class="feature-desc">96px+ 段间距<br>每个功能都有自己的房间</p></div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Framer</span><span class="tag">IBM</span><span class="tag">Linear</span><span class="tag">Lovable</span><span class="tag active">Expo</span>
  </div>
</div>
</body>
</html>
