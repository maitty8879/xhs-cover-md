<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVIDIA Design System Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#000000; overflow:hidden; }
  .frame {
    width:1500px; height:2000px; display:flex; flex-direction:column;
    font-family:'Inter','Noto Sans SC',sans-serif; position:relative;
    background:#000000; box-sizing:border-box; padding:60px 80px 50px;
  }
  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:40px;
  }
  .series-tag {
    background:transparent; color:#ffffff; font-size:28px; font-weight:700;
    padding:12px 30px; border-radius:2px;
    border:2px solid #76b900;
  }
  .author {
    font-size:22px; color:#a7a7a7; font-weight:400;
  }
  .author strong { color:#ffffff; }
  .hero { flex:1; display:flex; flex-direction:column; justify-content:center; }
  .overline {
    font-size:26px; font-weight:700; color:#76b900;
    text-transform:uppercase; letter-spacing:2px; margin-bottom:20px;
  }
  .headline {
    font-size:128px; font-weight:700; color:#ffffff;
    line-height:1.15; margin-bottom:30px; white-space:pre-line;
  }
  .subheadline {
    font-size:32px; font-weight:400; color:#a7a7a7;
    margin-bottom:50px; line-height:1.5;
  }
  .cta-row { display:flex; gap:20px; margin-bottom:60px; }
  .cta-primary {
    background:transparent; color:#ffffff; font-size:26px; font-weight:700;
    padding:18px 44px; border-radius:2px;
    border:2px solid #76b900;
  }
  .cta-secondary {
    background:transparent; color:#a7a7a7; font-size:26px; font-weight:700;
    padding:18px 44px; border-radius:2px;
    border:1px solid #5e5e5e;
  }
  .features {
    display:grid; grid-template-columns:repeat(3,1fr); gap:30px;
    margin-bottom:50px;
  }
  .feature-card {
    background:#1a1a1a; border-radius:2px; padding:40px 32px;
    border-bottom:2px solid #76b900;
  }
  .feature-emoji { font-size:48px; margin-bottom:16px; }
  .feature-title {
    font-size:28px; font-weight:700; color:#ffffff; margin-bottom:12px;
  }
  .feature-desc {
    font-size:20px; font-weight:400; color:#a7a7a7; line-height:1.5;
  }
  .bottom-strip {
    display:flex; gap:16px; justify-content:center; padding-top:20px;
    border-top:1px solid #5e5e5e;
  }
  .bottom-strip .tag {
    font-size:20px; font-weight:700; color:#757575;
    padding:10px 24px; border-radius:2px;
    border:1px solid #5e5e5e; text-transform:uppercase;
  }
  .bottom-strip .tag.active {
    border-color:#76b900; color:#76b900;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <div class="series-tag">Vol.35 设计系统拆解</div>
    <div class="author"><strong>元气菌.AI</strong> / Learn in public 理念践行中</div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <div class="headline">用 NVIDIA 的
设计语言
做封面</div>
    <div class="subheadline">NVIDIA Green × 工业粗体 × GPU 级精密工程美学</div>
    <div class="cta-row">
      <div class="cta-primary">查看拆解 →</div>
      <div class="cta-secondary">设计档案</div>
    </div>
  </div>
  <div class="features">
    <div class="feature-card">
      <div class="feature-emoji">💚</div>
      <div class="feature-title">绿色信号系统</div>
      <div class="feature-desc">#76b900 只用于边框和下划线，从不做背景——这是信号而非表面</div>
    </div>
    <div class="feature-card">
      <div class="feature-emoji">⬛</div>
      <div class="feature-title">2px 极简圆角</div>
      <div class="feature-desc">几乎所有元素仅用 2px 圆角，锐利如精密加工的硬件面板</div>
    </div>
    <div class="feature-card">
      <div class="feature-emoji">🔠</div>
      <div class="feature-title">Bold 700 主导</div>
      <div class="feature-desc">大量使用粗体作为默认声音，导航全大写如硬件规格标签</div>
    </div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Vercel</span>
    <span class="tag">Linear</span>
    <span class="tag">Stripe</span>
    <span class="tag active">NVIDIA</span>
    <span class="tag">Figma</span>
  </div>
</div>
</body>
</html>
