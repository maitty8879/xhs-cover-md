<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: #ffffff; overflow: hidden; }
.frame {
  width: 1500px; height: 2000px; background: #ffffff; color: #101114;
  font-family: 'IBM Plex Sans', 'Noto Sans SC', sans-serif;
  position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.top-bar { width: 100%; padding: 48px 80px 0; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; flex-shrink: 0; }
.series-tag { font-size: 28px; font-weight: 600; color: #7132f5; padding: 14px 36px; border: 2px solid rgba(113,50,245,0.2); border-radius: 12px; }
.author-info { display: flex; align-items: center; gap: 14px; }
.author-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #7132f5, #5b1ecf); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #fff; font-family: 'Noto Sans SC', sans-serif; }
.author-text { display: flex; flex-direction: column; gap: 4px; }
.author-name { font-size: 28px; font-weight: 600; color: #101114; }
.author-desc { font-size: 22px; font-weight: 400; color: #686b82; }
.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 80px; }
.hero .overline { font-size: 24px; font-weight: 500; letter-spacing: 2px; color: #686b82; margin-bottom: 32px; text-transform: uppercase; }
.hero .headline { font-size: 128px; font-weight: 700; line-height: 1.05; letter-spacing: -3px; margin: 0 0 36px 0; color: #101114; font-family: 'Noto Sans SC', 'IBM Plex Sans', sans-serif; }
.hero .subheadline { font-size: 34px; font-weight: 400; line-height: 1.4; color: #686b82; margin: 0 0 52px 0; max-width: 1000px; letter-spacing: -0.3px; }
.cta-row { display: flex; gap: 20px; }
.cta-primary { background: #7132f5; color: #fff; font-family: 'IBM Plex Sans', sans-serif; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 12px; border: none; }
.cta-secondary { background: transparent; color: #5741d8; font-family: 'IBM Plex Sans', sans-serif; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 12px; border: 2px solid #5741d8; }
.features { padding: 0 80px 64px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-shrink: 0; }
.feature-card { background: #ffffff; border-radius: 12px; padding: 48px 36px 44px; text-align: center; border: 1px solid #dedee5; box-shadow: rgba(0,0,0,0.03) 0px 4px 24px; }
.feature-icon { font-size: 52px; margin-bottom: 20px; line-height: 1; }
.feature-title { font-size: 28px; font-weight: 700; line-height: 1.2; margin: 0 0 12px 0; color: #101114; letter-spacing: -0.3px; }
.feature-desc { font-size: 20px; font-weight: 400; line-height: 1.5; color: #686b82; margin: 0; }
.bottom-strip { height: 72px; padding: 0 80px; display: flex; align-items: center; justify-content: center; gap: 14px; border-top: 1px solid #dedee5; flex-shrink: 0; }
.bottom-strip .tag { font-size: 17px; font-weight: 500; color: #686b82; padding: 7px 20px; border: 1px solid #dedee5; border-radius: 12px; }
.bottom-strip .tag.active { color: #7132f5; border-color: rgba(113,50,245,0.3); }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">大厂设计语言 · Vol.26</span>
    <div class="author-info">
      <div class="author-avatar">元</div>
      <div class="author-text">
        <span class="author-name">元气菌.AI</span>
        <span class="author-desc">Learn in public 理念践行中</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <h1 class="headline">用 Kraken 的<br>设计语言<br>做封面</h1>
    <p class="subheadline">Kraken Purple × 冷调蓝灰中性色 × 细语级阴影，最专业的加密交易所</p>
    <div class="cta-row">
      <button class="cta-primary">获取模板 →</button>
      <button class="cta-secondary">了解更多</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🐙</div><h3 class="feature-title">Kraken Purple</h3><p class="feature-desc">#7132f5<br>加密巨兽的品牌紫</p></div>
    <div class="feature-card"><div class="feature-icon">🪙</div><h3 class="feature-title">双字体系统</h3><p class="feature-desc">Brand + Product<br>展示与功能各司其职</p></div>
    <div class="feature-card"><div class="feature-icon">🛡️</div><h3 class="feature-title">12px 圆角</h3><p class="feature-desc">圆润但不过度<br>专业可信的交互组件</p></div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Intercom</span><span class="tag active">Kraken</span><span class="tag">Lamborghini</span><span class="tag">Linear</span><span class="tag">Lovable</span>
  </div>
</div>
</body>
</html>
