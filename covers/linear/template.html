<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#08090a;overflow:hidden}
.frame{width:1500px;height:2000px;background:#08090a;color:#f7f8f8;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:500;color:#5e6ad2;padding:12px 32px;border:2px solid rgba(94,106,210,.25);border-radius:8px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:8px;background:linear-gradient(135deg,#5e6ad2,#7170ff);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:500;color:#f7f8f8}
.author-desc{font-size:22px;font-weight:400;color:rgba(255,255,255,.35)}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
.hero .overline{font-size:22px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:128px;font-weight:500;line-height:1.05;letter-spacing:-3px;margin:0 0 36px;color:#f7f8f8;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:32px;font-weight:300;line-height:1.4;color:rgba(255,255,255,.45);margin:0 0 52px;max-width:1100px}
.cta-row{display:flex;gap:20px}
.cta-primary{background:#5e6ad2;color:#fff;font-family:'Inter';font-size:20px;font-weight:500;padding:16px 40px;border-radius:8px;border:none}
.cta-secondary{background:rgba(255,255,255,.03);color:rgba(255,255,255,.7);font-family:'Inter';font-size:20px;font-weight:400;padding:16px 40px;border-radius:8px;border:1px solid rgba(255,255,255,.06)}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:#0f1011;border-radius:12px;padding:48px 36px 44px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:26px;font-weight:500;line-height:1.2;margin:0 0 12px;color:#f7f8f8}
.feature-desc{font-size:19px;font-weight:400;line-height:1.5;color:rgba(255,255,255,.35);margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:500;color:rgba(255,255,255,.25);padding:7px 20px;border:1px solid rgba(255,255,255,.05);border-radius:8px}
.bottom-strip .tag.active{color:#7170ff;border-color:rgba(113,112,255,.2)}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.28</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 Linear 的<br>设计语言<br>做封面</h1><p class="subheadline">深空近黑 × 靛紫唯一色 × 月光边框，暗色原生的极致精密</p><div class="cta-row"><button class="cta-primary">获取模板 →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🌑</div><h3 class="feature-title">暗色原生</h3><p class="feature-desc">#08090a 不是暗色主题<br>是以暗色为母语的设计</p></div>
    <div class="feature-card"><div class="feature-icon">💜</div><h3 class="feature-title">靛紫唯一色</h3><p class="feature-desc">#5e6ad2 全站仅此一个彩色<br>只给 CTA 和品牌元素</p></div>
    <div class="feature-card"><div class="feature-icon">🌙</div><h3 class="feature-title">月光边框</h3><p class="feature-desc">rgba(255,255,255,0.05)<br>如月光画出的结构线</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">Cursor</span><span class="tag">Figma</span><span class="tag active">Linear</span><span class="tag">Notion</span><span class="tag">Vercel</span></div>
</div>
</body>
</html>
