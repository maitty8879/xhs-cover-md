<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#050507;overflow:hidden}
.frame{width:1500px;height:2000px;background:#050507;color:#e8e4e0;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:500;color:#00d992;padding:12px 32px;border:2px solid rgba(0,217,146,.25);border-radius:8px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:8px;background:#00d992;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#050507;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:500;color:#e8e4e0}
.author-desc{font-size:22px;font-weight:400;color:#8b949e}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px;position:relative}
.hero::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(0,217,146,.06) 0%,transparent 70%);top:40%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.hero .overline{font-size:22px;font-weight:500;letter-spacing:2px;color:#8b949e;margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:120px;font-weight:700;line-height:1.05;letter-spacing:-2px;margin:0 0 36px;color:#e8e4e0;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:32px;font-weight:300;line-height:1.4;color:#8b949e;margin:0 0 52px;max-width:1100px}
.cta-row{display:flex;gap:20px}
.cta-primary{background:#00d992;color:#050507;font-family:'Inter';font-size:20px;font-weight:600;padding:18px 42px;border-radius:8px;border:none}
.cta-secondary{background:rgba(255,255,255,.04);color:#b8b3b0;font-family:'Inter';font-size:20px;font-weight:400;padding:18px 42px;border-radius:8px;border:1px solid #3d3a39}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:rgba(255,255,255,.02);border-radius:12px;padding:48px 36px 44px;text-align:center;border:1px solid #3d3a39}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:26px;font-weight:600;line-height:1.2;margin:0 0 12px;color:#e8e4e0}
.feature-desc{font-size:19px;font-weight:400;line-height:1.5;color:#8b949e;margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid #3d3a39;flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:500;color:#8b949e;padding:7px 20px;border:1px solid #3d3a39;border-radius:8px}
.bottom-strip .tag.active{color:#00d992;border-color:rgba(0,217,146,.25)}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.53</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 VoltAgent<br>的设计语言<br>做封面</h1><p class="subheadline">碳黑深空 × 翡翠信号绿 × 暖灰边界，AI Agent 的驾驶舱美学</p><div class="cta-row"><button class="cta-primary">获取模板 →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">⚡</div><h3 class="feature-title">信号绿</h3><p class="feature-desc">#00d992 像电路通电<br>全站唯一的能量色</p></div>
    <div class="feature-card"><div class="feature-icon">🌑</div><h3 class="feature-title">碳黑画布</h3><p class="feature-desc">#050507 比纯黑更深沉<br>暖灰边界防止冰冷</p></div>
    <div class="feature-card"><div class="feature-icon">✨</div><h3 class="feature-title">绿色辉光</h3><p class="feature-desc">drop-shadow 发光边框<br>UI 元素像通了电一样</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">OpenCode</span><span class="tag">Raycast</span><span class="tag">Supabase</span><span class="tag active">VoltAgent</span><span class="tag">Warp</span></div>
</div>
</body>
</html>
