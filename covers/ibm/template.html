<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: #ffffff; overflow: hidden; }
.frame { width: 1500px; height: 2000px; background: #ffffff; color: #161616; font-family: 'Inter','Noto Sans SC',sans-serif; position: relative; overflow: hidden; display: flex; flex-direction: column; }
.top-bar { width: 100%; padding: 48px 80px 0; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; flex-shrink: 0; }
.series-tag { font-size: 28px; font-weight: 600; color: #0f62fe; padding: 12px 32px; border: 2px solid rgba(15,98,254,0.25); border-radius: 0px; }
.author-info { display: flex; align-items: center; gap: 14px; }
.author-avatar { width: 64px; height: 64px; border-radius: 0px; background: #0f62fe; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #fff; font-family: 'Noto Sans SC'; }
.author-text { display: flex; flex-direction: column; gap: 4px; }
.author-name { font-size: 28px; font-weight: 600; color: #161616; }
.author-desc { font-size: 22px; font-weight: 400; color: #525252; }
.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 80px; }
.hero .overline { font-size: 24px; font-weight: 500; letter-spacing: 2px; color: #525252; margin-bottom: 32px; text-transform: uppercase; }
.hero .headline { font-size: 128px; font-weight: 700; line-height: 1.05; letter-spacing: -3px; margin: 0 0 36px; color: #161616; font-family: 'Noto Sans SC','Inter',sans-serif; }
.hero .subheadline { font-size: 34px; font-weight: 300; line-height: 1.4; color: #6f6f6f; margin: 0 0 52px; max-width: 1000px; }
.cta-row { display: flex; gap: 20px; }
.cta-primary { background: #0f62fe; color: #fff; font-family: 'Inter'; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 0px; border: none; }
.cta-secondary { background: transparent; color: #0f62fe; font-family: 'Inter'; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 0px; border: 1.5px solid rgba(15,98,254,0.5); }
.features { padding: 0 80px 64px; display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; flex-shrink: 0; }
.feature-card { background: #f4f4f4; border-radius: 0px; padding: 48px 36px 44px; text-align: center; }
.feature-icon { font-size: 52px; margin-bottom: 20px; line-height: 1; }
.feature-title { font-size: 28px; font-weight: 700; line-height: 1.2; margin: 0 0 12px; color: #161616; }
.feature-desc { font-size: 20px; font-weight: 400; line-height: 1.5; color: #525252; margin: 0; }
.bottom-strip { height: 72px; padding: 0 80px; display: flex; align-items: center; justify-content: center; gap: 14px; border-top: 1px solid #e0e0e0; flex-shrink: 0; }
.bottom-strip .tag { font-size: 17px; font-weight: 500; color: #525252; padding: 7px 20px; border: 1px solid #e0e0e0; border-radius: 0px; }
.bottom-strip .tag.active { color: #0f62fe; border-color: rgba(15,98,254,0.25); }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">大厂设计语言 · Vol.24</span>
    <div class="author-info">
      <div class="author-avatar">元</div>
      <div class="author-text">
        <span class="author-name">元气菌.AI</span>
        <span class="author-desc">Learn in public 理念践行中</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <h1 class="headline">用 IBM 的<br>设计语言<br>做封面</h1>
    <p class="subheadline">Carbon 设计系统，0px 圆角直角按钮与 8px 网格的企业级精密工程</p>
    <div class="cta-row">
      <button class="cta-primary">获取模板 →</button>
      <button class="cta-secondary">了解更多</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🔷</div><h3 class="feature-title">IBM Blue 60</h3><p class="feature-desc">#0f62fe 唯一交互色贯穿全系统</p></div>
    <div class="feature-card"><div class="feature-icon">📐</div><h3 class="feature-title">零圆角哲学</h3><p class="feature-desc">0px 直角按钮，毫不妥协的工程美学</p></div>
    <div class="feature-card"><div class="feature-icon">🏗️</div><h3 class="feature-title">Carbon 令牌</h3><p class="feature-desc">--cds-* 语义化令牌驱动全局主题</p></div>
  </div>
  <div class="bottom-strip">
    <span class="tag">企业级</span><span class="tag">Carbon DS</span><span class="tag active">IBM</span><span class="tag">Plex 字体</span><span class="tag">8px 网格</span>
  </div>
</div>
</body>
</html>
