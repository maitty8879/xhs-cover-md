<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: #f5f4ed; overflow: hidden; }
.frame {
  width: 1500px; height: 2000px; background: #f5f4ed; color: #141413;
  font-family: 'Noto Serif SC', 'Georgia', serif;
  position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.top-bar { width: 100%; padding: 48px 80px 0; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; flex-shrink: 0; }
.series-tag { font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 28px; font-weight: 500; color: #c96442; padding: 12px 32px; border: 2px solid rgba(201,100,66,0.3); border-radius: 980px; }
.author-info { display: flex; align-items: center; gap: 14px; }
.author-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #c96442, #d97757); display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #fff; font-family: 'Noto Sans SC', sans-serif; }
.author-text { display: flex; flex-direction: column; gap: 4px; }
.author-name { font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 28px; font-weight: 600; color: #141413; }
.author-desc { font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 22px; font-weight: 400; color: #87867f; }
.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 80px; }
.hero .overline { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 400; letter-spacing: 2px; color: #87867f; margin-bottom: 32px; text-transform: uppercase; }
.hero .headline { font-size: 120px; font-weight: 900; line-height: 1.1; letter-spacing: -2px; margin: 0 0 36px 0; color: #141413; }
.hero .subheadline { font-family: 'Noto Sans SC', 'Inter', sans-serif; font-size: 34px; font-weight: 300; line-height: 1.4; color: #5e5d59; margin: 0 0 52px 0; max-width: 1000px; }
.cta-row { display: flex; gap: 20px; }
.cta-primary { background: #c96442; color: #fff; font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 980px; border: none; }
.cta-secondary { background: transparent; color: #c96442; font-family: 'Inter', 'Noto Sans SC', sans-serif; font-size: 22px; font-weight: 400; padding: 18px 42px; border-radius: 980px; border: 2px solid rgba(201,100,66,0.4); }
.features { padding: 0 80px 64px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-shrink: 0; }
.feature-card { background: #faf9f5; border-radius: 20px; padding: 48px 36px 44px; text-align: center; box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.06); }
.feature-icon { font-size: 52px; margin-bottom: 20px; line-height: 1; }
.feature-title { font-family: 'Noto Sans SC', sans-serif; font-size: 28px; font-weight: 700; line-height: 1.2; margin: 0 0 12px 0; color: #141413; }
.feature-desc { font-family: 'Noto Sans SC', sans-serif; font-size: 20px; font-weight: 400; line-height: 1.5; color: #87867f; margin: 0; }
.bottom-strip { height: 72px; padding: 0 80px; display: flex; align-items: center; justify-content: center; gap: 14px; border-top: 1px solid #e8e6dc; flex-shrink: 0; }
.bottom-strip .tag { font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 500; color: #87867f; padding: 7px 20px; border: 1px solid #e8e6dc; border-radius: 980px; }
.bottom-strip .tag.active { color: #c96442; border-color: rgba(201,100,66,0.3); }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">大厂设计语言 · Vol.02</span>
    <div class="author-info">
      <div class="author-avatar">元</div>
      <div class="author-text">
        <span class="author-name">元气菌.AI</span>
        <span class="author-desc">Learn in public 理念践行中</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <h1 class="headline">用 Claude 的<br>设计语言<br>做封面</h1>
    <p class="subheadline">赤陶色 × 羊皮纸底色 × 衬线字体，最有书卷气的 AI 品牌</p>
    <div class="cta-row">
      <button class="cta-primary">获取模板 →</button>
      <button class="cta-secondary">了解更多</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">📜</div><h3 class="feature-title">羊皮纸底色</h3><p class="feature-desc">#f5f4ed 暖调米色<br>像高质量纸张不是屏幕</p></div>
    <div class="feature-card"><div class="feature-icon">🧱</div><h3 class="feature-title">赤陶强调色</h3><p class="feature-desc">#c96442<br>温暖泥土感 反科技美学</p></div>
    <div class="feature-card"><div class="feature-icon">Aa</div><h3 class="feature-title">衬线字体</h3><p class="feature-desc">Anthropic Serif<br>每个标题像一本书名</p></div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Apple</span><span class="tag active">Claude</span><span class="tag">Figma</span><span class="tag">Notion</span><span class="tag">Tesla</span>
  </div>
</div>
</body>
</html>
