<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; background: #ffffff; overflow: hidden; }
.frame {
  width: 1500px; height: 2000px; background: #ffffff; color: #211922;
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  position: relative; overflow: hidden; display: flex; flex-direction: column;
}
.top-bar { width: 100%; padding: 48px 80px 0; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; flex-shrink: 0; }
.series-tag { font-size: 28px; font-weight: 600; color: #e60023; padding: 14px 36px; border: 2px solid rgba(230,0,35,0.2); border-radius: 40px; }
.author-info { display: flex; align-items: center; gap: 14px; }
.author-avatar { width: 64px; height: 64px; border-radius: 50%; background: #e60023; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 700; color: #fff; font-family: 'Noto Sans SC', sans-serif; }
.author-text { display: flex; flex-direction: column; gap: 4px; }
.author-name { font-size: 28px; font-weight: 600; color: #211922; }
.author-desc { font-size: 22px; font-weight: 400; color: #62625b; }
.hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 80px; }
.hero .overline { font-size: 24px; font-weight: 500; letter-spacing: 2px; color: #91918c; margin-bottom: 32px; text-transform: uppercase; }
.hero .headline { font-size: 128px; font-weight: 900; line-height: 1.05; letter-spacing: -3px; margin: 0 0 36px 0; color: #211922; font-family: 'Noto Sans SC', 'Inter', sans-serif; }
.hero .subheadline { font-size: 34px; font-weight: 300; line-height: 1.4; color: #62625b; margin: 0 0 52px 0; max-width: 1000px; }
.cta-row { display: flex; gap: 20px; }
.cta-primary { background: #e60023; color: #fff; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 40px; border: none; }
.cta-secondary { background: #e5e5e0; color: #211922; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 500; padding: 18px 42px; border-radius: 40px; border: none; }
.features { padding: 0 80px 64px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-shrink: 0; }
.feature-card { background: hsla(60,20%,98%,0.8); border-radius: 24px; padding: 48px 36px 44px; text-align: center; border: 1px solid #e5e5e0; }
.feature-icon { font-size: 52px; margin-bottom: 20px; line-height: 1; }
.feature-title { font-size: 28px; font-weight: 700; line-height: 1.2; margin: 0 0 12px 0; color: #211922; }
.feature-desc { font-size: 20px; font-weight: 400; line-height: 1.5; color: #62625b; margin: 0; }
.bottom-strip { height: 72px; padding: 0 80px; display: flex; align-items: center; justify-content: center; gap: 14px; border-top: 1px solid #e5e5e0; flex-shrink: 0; }
.bottom-strip .tag { font-size: 17px; font-weight: 500; color: #91918c; padding: 7px 20px; border: 1px solid #e5e5e0; border-radius: 40px; }
.bottom-strip .tag.active { color: #e60023; border-color: rgba(230,0,35,0.2); }
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar">
    <span class="series-tag">大厂设计语言 · Vol.06</span>
    <div class="author-info">
      <div class="author-avatar">元</div>
      <div class="author-text">
        <span class="author-name">元气菌.AI</span>
        <span class="author-desc">Learn in public 理念践行中</span>
      </div>
    </div>
  </div>
  <div class="hero">
    <div class="overline">Design System Breakdown</div>
    <h1 class="headline">用 Pinterest<br>的设计语言<br>做封面</h1>
    <p class="subheadline">自信红 × 暖调沙灰 × 手工质感圆角，灵感瀑布的视觉密码</p>
    <div class="cta-row">
      <button class="cta-primary">获取模板 →</button>
      <button class="cta-secondary">了解更多</button>
    </div>
  </div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">📌</div><h3 class="feature-title">Pinterest 红</h3><p class="feature-desc">#e60023<br>大胆 · 自信 · 永远抢眼</p></div>
    <div class="feature-card"><div class="feature-icon">🏖️</div><h3 class="feature-title">暖沙灰</h3><p class="feature-desc">#e5e5e0 沙色按钮<br>橄榄调中性色 不冰冷</p></div>
    <div class="feature-card"><div class="feature-icon">🧶</div><h3 class="feature-title">手工质感</h3><p class="feature-desc">16-40px 大圆角<br>圆润 · 亲切 · 像杂志</p></div>
  </div>
  <div class="bottom-strip">
    <span class="tag">Apple</span><span class="tag">Claude</span><span class="tag">Figma</span><span class="tag active">Pinterest</span><span class="tag">Tesla</span>
  </div>
</div>
</body>
</html>
