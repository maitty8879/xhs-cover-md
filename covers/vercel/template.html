<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;background:#fff;overflow:hidden}
.frame{width:1500px;height:2000px;background:#fff;color:#171717;font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;display:flex;flex-direction:column}
.top-bar{width:100%;padding:48px 80px 0;display:flex;align-items:center;justify-content:space-between;box-sizing:border-box;flex-shrink:0}
.series-tag{font-size:28px;font-weight:500;color:#171717;padding:12px 32px;border:2px solid rgba(23,23,23,.15);border-radius:8px}
.author-info{display:flex;align-items:center;gap:14px}
.author-avatar{width:64px;height:64px;border-radius:50%;background:#171717;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;font-family:'Noto Sans SC'}
.author-text{display:flex;flex-direction:column;gap:4px}
.author-name{font-size:28px;font-weight:500;color:#171717}
.author-desc{font-size:22px;font-weight:400;color:#666}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
.hero .overline{font-size:22px;font-weight:500;letter-spacing:2px;color:#666;margin-bottom:32px;text-transform:uppercase}
.hero .headline{font-size:128px;font-weight:700;line-height:1.05;letter-spacing:-4px;margin:0 0 36px;color:#171717;font-family:'Noto Sans SC','Inter',sans-serif}
.hero .subheadline{font-size:32px;font-weight:300;line-height:1.4;color:#666;margin:0 0 52px;max-width:1100px}
.cta-row{display:flex;gap:20px}
.cta-primary{background:#171717;color:#fff;font-family:'Inter';font-size:20px;font-weight:500;padding:16px 40px;border-radius:8px;border:none}
.cta-secondary{background:#fafafa;color:#171717;font-family:'Inter';font-size:20px;font-weight:500;padding:16px 40px;border-radius:8px;border:1px solid rgba(23,23,23,.15)}
.features{padding:0 80px 64px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;flex-shrink:0}
.feature-card{background:#fafafa;border-radius:12px;padding:48px 36px 44px;text-align:center;border:1px solid rgba(23,23,23,.08)}
.feature-icon{font-size:52px;margin-bottom:20px;line-height:1}
.feature-title{font-size:26px;font-weight:600;line-height:1.2;margin:0 0 12px;color:#171717}
.feature-desc{font-size:19px;font-weight:400;line-height:1.5;color:#666;margin:0}
.bottom-strip{height:72px;padding:0 80px;display:flex;align-items:center;justify-content:center;gap:14px;border-top:1px solid rgba(23,23,23,.08);flex-shrink:0}
.bottom-strip .tag{font-size:17px;font-weight:500;color:#666;padding:7px 20px;border:1px solid rgba(23,23,23,.08);border-radius:8px}
.bottom-strip .tag.active{color:#171717;border-color:rgba(23,23,23,.2)}
</style>
</head>
<body>
<div class="frame">
  <div class="top-bar"><span class="series-tag">大厂设计语言 · Vol.52</span><div class="author-info"><div class="author-avatar">元</div><div class="author-text"><span class="author-name">元气菌.AI</span><span class="author-desc">Learn in public 理念践行中</span></div></div></div>
  <div class="hero"><div class="overline">Design System Breakdown</div><h1 class="headline">用 Vercel 的<br>设计语言<br>做封面</h1><p class="subheadline">画廊级留白 × Geist 字体 × 编译器极简，代码美学的终极形态</p><div class="cta-row"><button class="cta-primary">获取模板 →</button><button class="cta-secondary">了解更多</button></div></div>
  <div class="features">
    <div class="feature-card"><div class="feature-icon">🖼️</div><h3 class="feature-title">画廊留白</h3><p class="feature-desc">每个元素都在赚取像素<br>不必要的就不存在</p></div>
    <div class="feature-card"><div class="feature-icon">🔤</div><h3 class="feature-title">Geist 字体</h3><p class="feature-desc">#171717 微暖近黑<br>不是纯黑 是柔化后的精密</p></div>
    <div class="feature-card"><div class="feature-icon">🔴🟣🔵</div><h3 class="feature-title">工作流彩色</h3><p class="feature-desc">Ship 红 / Preview 粉 / Dev 蓝<br>三色分别对应三个阶段</p></div>
  </div>
  <div class="bottom-strip"><span class="tag">Linear</span><span class="tag">Stripe</span><span class="tag">Supabase</span><span class="tag active">Vercel</span><span class="tag">Warp</span></div>
</div>
</body>
</html>
